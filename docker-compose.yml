services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: devkarm
      POSTGRES_USER: devkarm
      POSTGRES_PASSWORD: devkarm_dev_password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devkarm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/devkarm
      KC_DB_USERNAME: devkarm
      KC_DB_PASSWORD: devkarm_dev_password
    ports:
      - "8080:8080"
    command: start-dev
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
